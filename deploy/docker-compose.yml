services:
  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_logs:/mosquitto/log
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mosquitto_sub", "-t", "$$SYS/broker/uptime", "-C", "1", "-E"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  nodered:
    build: ./nodered
    ports:
      - "1880:1880"
    volumes:
      - ./nodered/data:/data
      - ./nodered/data/flows.json:/data/flows.json
    depends_on:
      mosquitto:
        condition: service_healthy
    environment:
      - TZ=${TZ:-America/Argentina/Buenos_Aires}
    restart: unless-stopped

  backend:
    build:
      context: ..
      dockerfile: deploy/reconocimiento/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    environment:
      - MODE=PROD_MQTT
      - EQUIPO_ID=equipoXX
      - MQTT_BROKER=mosquitto
      - DB_PATH=/app/data/access_control.db
    depends_on:
      mosquitto:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ..
      dockerfile: deploy/interfaz/Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mosquitto_data:
  mosquitto_logs:
