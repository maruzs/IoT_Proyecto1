services:
  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "8883:8883"
    volumes:
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./mosquitto/config/entrypoint.sh:/mosquitto/config/entrypoint.sh:ro
      - ./mosquitto/certs:/mosquitto/certs:ro
      - ./mosquitto/config/passwd:/mosquitto/config/passwd:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_logs:/mosquitto/log
    entrypoint: ["/bin/sh", "/mosquitto/config/entrypoint.sh"]
    environment:
      - MQTT_USER=${MQTT_USER}
      - MQTT_PASSWORD=${MQTT_PASSWORD}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mosquitto_sub", "-h", "127.0.0.1", "-p", "1883", "-t", "$$SYS/broker/uptime", "-C", "1", "-E"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  nodered:
    build:
      context: ..
      dockerfile: deploy/nodered/Dockerfile
      args:
        - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
    ports:
      - "1880:1880"
    volumes:
      - ./nodered/data:/data
      - ./mosquitto/certs:/certs:ro
    depends_on:
      mosquitto:
        condition: service_healthy
    environment:
      - TZ=${TZ:-America/Argentina/Buenos_Aires}
    restart: unless-stopped

  backend:
    privileged: true
    build:
      context: ..
      dockerfile: deploy/reconocimiento/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./mosquitto/certs:/certs:ro
    devices:
      - /dev/video0:/dev/video0
      - /dev/video1:/dev/video1
    group_add:
      - "983"  # video group
    environment:
      - MODE=PROD_MQTT
      - EQUIPO_ID=equipo69
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=${MQTT_PORT:-8883}
      - MQTT_USER=${MQTT_USER}
      - MQTT_PASSWORD=${MQTT_PASSWORD}
      - MQTT_TLS_CA=/certs/ca.crt
      - DB_PATH=/app/data/access_control.db
      - DISPLAY=${DISPLAY}
      - TZ=America/Santiago
      - OPENCV_VIDEOIO_BACKEND=V4L2
      - PYTHONUNBUFFERED=1
    depends_on:
      mosquitto:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ..
      dockerfile: deploy/interfaz/Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mosquitto_data:
  mosquitto_logs:
