services:
  mosquitto:
    build:
      context: ..
      dockerfile: deploy/mosquitto/docker/Dockerfile
      args:
        - MQTT_USER=${MQTT_USER:-equipo69}
        - MQTT_PASSWORD=${MQTT_PASSWORD:-IoT2026Secure!}
        - MQTT_BROKER_IP=${MQTT_BROKER_IP:-127.0.0.1}
    ports:
      - "8883:8883"
      - "1884:1884"
    volumes:
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./mosquitto/certs:/mosquitto/certs:ro
      - ./mosquitto/config/passwd:/mosquitto/config/passwd:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_logs:/mosquitto/log
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mosquitto_sub", "-t", "$$SYS/broker/uptime", "-p", "1883", "-C", "1", "-E"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  nodered:
    build:
      context: ..
      dockerfile: deploy/nodered/Dockerfile
      args:
        - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
        - MQTT_USER=${MQTT_USER:-equipo69}
        - MQTT_PASSWORD=${MQTT_PASSWORD:-IoT2026Secure!}
    ports:
      - "1880:1880"
    volumes:
      - ./nodered/data:/data
      - ./mosquitto/certs:/certs:ro
    depends_on:
      mosquitto:
        condition: service_healthy
    environment:
      - TZ=${TZ:-America/Argentina/Buenos_Aires}
      - MQTT_PORT=${MQTT_PORT:-8883}
      - MQTT_USER=${MQTT_USER}
      - MQTT_PASSWORD=${MQTT_PASSWORD}
      - MQTT_TLS_CA=/certs/ca.crt
    restart: unless-stopped

  backend:
    privileged: true
    build:
      context: ..
      dockerfile: deploy/reconocimiento/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./mosquitto/certs:/certs:ro
    devices:
      - /dev/video0:/dev/video0
      - /dev/video1:/dev/video1
    group_add:
      - "983"  # video group
    environment:
      - MODE=PROD_MQTT
      - EQUIPO_ID=equipo69
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=${MQTT_PORT:-8883}
      - MQTT_USER=${MQTT_USER}
      - MQTT_PASSWORD=${MQTT_PASSWORD}
      - MQTT_TLS_CA=/certs/ca.crt
      - DB_PATH=/app/data/access_control.db
      - DISPLAY=${DISPLAY}
      - TZ=America/Santiago
      - OPENCV_VIDEOIO_BACKEND=V4L2
      - PYTHONUNBUFFERED=1
    depends_on:
      mosquitto:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ..
      dockerfile: deploy/interfaz/Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

  ollama:
    build:
      context: ..
      dockerfile: deploy/ollama/Dockerfile
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_MODEL=${OLLAMA_MODEL:-phi3:mini}
    restart: unless-stopped

  llm-gateway:
    build:
      context: ..
      dockerfile: deploy/llm-gateway/Dockerfile
    ports:
      - "8001:8000"
    volumes:
      - ./mosquitto/certs/ca.crt:/certs/ca.crt:ro
    environment:
      - OLLAMA_URL=${OLLAMA_URL:-http://ollama:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-phi3:mini}
      - OLLAMA_TIMEOUT=${OLLAMA_TIMEOUT:-30}
      - MAX_RETRIES=${MAX_RETRIES:-3}
      - MQTT_BROKER=${MQTT_BROKER:-mosquitto}
      - MQTT_PORT=${MQTT_PORT:-8883}
      - MQTT_USER=${MQTT_USER:-equipo69}
      - MQTT_PASS=${MQTT_PASS:-}
      - MQTT_TLS=${MQTT_TLS:-true}
      - MQTT_CA_CERT=${MQTT_CA_CERT:-/certs/ca.crt}
      - EQUIPO_ID=${EQUIPO_ID:-equipo69}
    depends_on:
      mosquitto:
        condition: service_healthy
      ollama:
        condition: service_started
    restart: unless-stopped

volumes:
  mosquitto_certs:
  mosquitto_data:
  mosquitto_logs:
  ollama_data:
