services:
  mosquitto:
    build:
      context: ..
      dockerfile: deploy/mosquitto/docker/Dockerfile
      args:
        - MQTT_BROKER_IP=${MQTT_BROKER_IP:-127.0.0.1}
    ports:
      - "8883:8883"
      - "1884:1884"
    volumes:
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./mosquitto/config/acl.conf:/mosquitto/config/acl.conf:ro
      - ./mosquitto/certs:/mosquitto/certs:ro
      - ./mosquitto/config/passwd:/mosquitto/config/passwd:rw
      - mosquitto_data:/mosquitto/data
      - mosquitto_logs:/mosquitto/log
    environment:
      - MQTT_USER_MKR1000=${MQTT_USER_MKR1000}
      - MQTT_PASS_MKR1000=${MQTT_PASS_MKR1000}
      - MQTT_USER_ESP32CAM=${MQTT_USER_ESP32CAM}
      - MQTT_PASS_ESP32CAM=${MQTT_PASS_ESP32CAM}
      - MQTT_USER_BACKEND=${MQTT_USER_BACKEND}
      - MQTT_PASS_BACKEND=${MQTT_PASS_BACKEND}
      - MQTT_USER_NODERED=${MQTT_USER_NODERED}
      - MQTT_PASS_NODERED=${MQTT_PASS_NODERED}
      - MQTT_USER_LLMGATEWAY=${MQTT_USER_LLMGATEWAY}
      - MQTT_PASS_LLMGATEWAY=${MQTT_PASS_LLMGATEWAY}
      - MQTT_USER_DIGITALTWIN=${MQTT_USER_DIGITALTWIN}
      - MQTT_PASS_DIGITALTWIN=${MQTT_PASS_DIGITALTWIN}
      - MQTT_USER_COAPBRIDGE=${MQTT_USER_COAPBRIDGE}
      - MQTT_PASS_COAPBRIDGE=${MQTT_PASS_COAPBRIDGE}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pgrep mosquitto | head -1 | xargs kill -0"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  nodered:
    build:
      context: ..
      dockerfile: deploy/nodered/Dockerfile
      args:
        - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
    ports:
      - "1880:1880"
    volumes:
      - ./nodered/data:/data
      - ./mosquitto/certs:/certs:ro
    depends_on:
      mosquitto:
        condition: service_healthy
    environment:
      - TZ=${TZ:-America/Argentina/Buenos_Aires}
      - MQTT_PORT=${MQTT_PORT:-8883}
      - MQTT_USER=${MQTT_USER_NODERED}
      - MQTT_PASSWORD=${MQTT_PASS_NODERED}
      - MQTT_TLS_CA=/certs/ca.crt
    restart: unless-stopped

  backend:
    privileged: true
    build:
      context: ..
      dockerfile: deploy/reconocimiento/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./mosquitto/certs:/certs:ro
    devices:
      - /dev/video0:/dev/video0
      - /dev/video1:/dev/video1
    group_add:
      - "983"  # video group
    environment:
      - MODE=PROD_MQTT
      - EQUIPO_ID=equipo69
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=${MQTT_PORT:-8883}
      - MQTT_USER=${MQTT_USER_BACKEND}
      - MQTT_PASSWORD=${MQTT_PASS_BACKEND}
      - MQTT_TLS_CA=/certs/ca.crt
      - DB_PATH=/app/data/access_control.db
      - DISPLAY=${DISPLAY}
      - TZ=America/Santiago
      - OPENCV_VIDEOIO_BACKEND=V4L2
      - PYTHONUNBUFFERED=1
    depends_on:
      mosquitto:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ..
      dockerfile: deploy/interfaz/Dockerfile
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./mosquitto/certs/server.crt:/etc/nginx/certs/cert.pem:ro
      - ./mosquitto/certs/server.key:/etc/nginx/certs/key.pem:ro
    depends_on:
      - backend
    restart: unless-stopped

  ollama:
    build:
      context: ..
      dockerfile: deploy/ollama/Dockerfile
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_MODEL=${OLLAMA_MODEL:-phi3:mini}
      - OLLAMA_KEEP_ALIVE=-1
      - OLLAMA_NUM_THREADS=6
    mem_limit: 4g
    restart: unless-stopped

  llm-gateway:
    build:
      context: ..
      dockerfile: deploy/llm-gateway/Dockerfile
    ports:
      - "8001:8000"
    volumes:
      - ./mosquitto/certs/ca.crt:/certs/ca.crt:ro
    environment:
      - OLLAMA_URL=${OLLAMA_URL:-http://ollama:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-phi3:mini}
      - OLLAMA_TIMEOUT=${OLLAMA_TIMEOUT:-30}
      - MAX_RETRIES=${MAX_RETRIES:-3}
      - MQTT_BROKER=${MQTT_BROKER:-mosquitto}
      - MQTT_PORT=${MQTT_PORT:-8883}
      - MQTT_USER=${MQTT_USER_LLMGATEWAY}
      - MQTT_PASS=${MQTT_PASS_LLMGATEWAY}
      - MQTT_TLS=${MQTT_TLS:-true}
      - MQTT_CA_CERT=${MQTT_CA_CERT:-/certs/ca.crt}
      - EQUIPO_ID=${EQUIPO_ID:-equipo69}
      - MCP_SERVER_URL=${MCP_SERVER_URL:-https://mcp-server:8002/mcp}
      - AGENT_ENABLED=${AGENT_ENABLED:-true}
      - AGENT_INTERVAL=${AGENT_INTERVAL:-30}
      - CRITICAL_GAS_THRESHOLD=${CRITICAL_GAS_THRESHOLD:-1020}
      - CRITICAL_TEMP_THRESHOLD=${CRITICAL_TEMP_THRESHOLD:-30.0}
      - LLM_TIMEOUT=${LLM_TIMEOUT:-3}
      - MCP_MAX_RETRIES=${MCP_MAX_RETRIES:-3}
    depends_on:
      mosquitto:
        condition: service_healthy
      ollama:
        condition: service_started
    restart: unless-stopped

  mcp-server:
    build:
      context: ..
      dockerfile: deploy/mcp-server/Dockerfile
    ports:
      - "8002:8002"
    volumes:
      - ./mosquitto/certs:/certs:ro
    environment:
      - MCP_NODE_RED_URL=${MCP_NODE_RED_URL:-http://nodered:1880}
      - MCP_DIGITAL_TWIN_URL=${MCP_DIGITAL_TWIN_URL:-}
      - MCP_PORT=${MCP_PORT:-8002}
    depends_on:
      nodered:
        condition: service_started
      mosquitto:
        condition: service_healthy
    restart: unless-stopped

  digital-twin:
    build:
      context: ..
      dockerfile: deploy/digital-twin/Dockerfile
    ports:
      - "8003:8000"
    volumes:
      - ./mosquitto/certs/ca.crt:/certs/ca.crt:ro
      - ./data:/app/data
    environment:
      - MQTT_BROKER=${MQTT_BROKER:-mosquitto}
      - MQTT_PORT=${MQTT_PORT:-8883}
      - MQTT_USER=${MQTT_USER_DIGITALTWIN}
      - MQTT_PASSWORD=${MQTT_PASS_DIGITALTWIN}
      - MQTT_TLS=${MQTT_TLS:-true}
      - MQTT_CA_CERT=${MQTT_CA_CERT:-/certs/ca.crt}
      - EQUIPO_ID=${EQUIPO_ID:-equipo69}
      - SNAPSHOT_PATH=/app/data/twin_snapshot.json
    depends_on:
      mosquitto:
        condition: service_healthy
    restart: unless-stopped

  coap-bridge:
    build:
      context: ..
      dockerfile: deploy/coap-bridge/Dockerfile
    ports:
      - "5683:5683/udp"
    volumes:
      - ./mosquitto/certs/ca.crt:/certs/ca.crt:ro
    environment:
      - MQTT_BROKER=${MQTT_BROKER:-mosquitto}
      - MQTT_PORT=${MQTT_PORT:-8883}
      - MQTT_USER=${MQTT_USER_COAPBRIDGE}
      - MQTT_PASS=${MQTT_PASS_COAPBRIDGE}
      - MQTT_TLS=${MQTT_TLS:-true}
      - MQTT_CA_CERT=${MQTT_CA_CERT:-/certs/ca.crt}
      - EQUIPO_ID=${EQUIPO_ID:-equipo69}
      - COAP_PORT=${COAP_PORT:-5683}
    depends_on:
      mosquitto:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mosquitto_certs:
  mosquitto_data:
  mosquitto_logs:
  ollama_data:
