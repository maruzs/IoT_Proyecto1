# =============================================================================
# Mosquitto ACL — per-client access control (T-002 + T-005)
# =============================================================================
# Replaces the single shared 'equipo69' credential with 7 individual users,
# each restricted to only the topics required for its function.
#
# Anonymous rules (Docker healthcheck on localhost:1883)

# Clients:
#   - mkr1000-equipo69    : MKR1000 sensor + actuator commands
#   - esp32cam-equipo69   : ESP32-CAM camera control + images
#   - backend-equipo69    : access control + camera consumer
#   - nodered-smarthome   : orchestrator (wildcard smarthome/+/datos)
#   - llm-gateway-equipo69: publish-only to llm/decision
#   - digital-twin-equipo69: full state subscriber + predictions
#   - coap-bridge-equipo69: CoAP-to-MQTT bridge for sensor readings
#
# NOTE: MCP Server has NO entry here — it uses HTTP -> Node-RED, not MQTT.
# =============================================================================

# ---------------------------------------------------------------------------
# Rollback procedure (copy-paste ready if ACL breaks dev)
# ---------------------------------------------------------------------------
# 1. Remove 'acl_file /mosquitto/config/acl.conf' lines from mosquitto.conf
# 2. Revert docker-compose.yml: passwd mount back to :ro, restore original
#    MQTT_USER/MQTT_PASSWORD env var mappings and build args
# 3. Revert Dockerfile: restore passwd generation at build time, remove
#    entrypoint COPY/ENTRYPOINT
# 4. Revert entrypoint.sh to cert-validation-only version
# 5. docker compose -f deploy/docker-compose.yml up -d --build mosquitto
# 6. Re-flash firmware with original 'equipo69' credentials if needed
# 7. Verify: mosquitto_pub -u equipo69 -P IoT2026Secure! \
#       -t smarthome/equipo69/datos -m '{"test":1}' succeeds
# ---------------------------------------------------------------------------

# MKR1000 — sensor readings + actuator commands
user mkr1000-equipo69
topic read smarthome/equipo69/control/led
topic read smarthome/equipo69/control/buzzer
topic read smarthome/equipo69/control/led-puerta
topic write smarthome/equipo69/datos
topic write smarthome/equipo69/alerta

# ESP32-CAM — camera control + image publishing
user esp32cam-equipo69
topic read smarthome/equipo69/camara/captura
topic write smarthome/equipo69/camara/evento
topic write smarthome/equipo69/camara/imagen

# Backend — access control + camera consumer
user backend-equipo69
topic read smarthome/equipo69/camara/imagen
topic read smarthome/equipo69/camara/url
topic write smarthome/equipo69/acceso/estado
topic write smarthome/equipo69/acceso/enrolar
topic write smarthome/equipo69/control/led-puerta
topic write smarthome/equipo69/camara/captura

# Node-RED — orchestrator
user nodered-smarthome
topic read smarthome/+/datos
topic read smarthome/equipo69/camara/evento
topic read smarthome/equipo69/llm/decision
topic read smarthome/equipo69/sensores/#
topic write smarthome/equipo69/control/led
topic write smarthome/equipo69/control/buzzer
topic write smarthome/equipo69/control/led-puerta
topic write smarthome/equipo69/camara/captura

# LLM Gateway — reasoning decisions only (publish-only, no subscribe)
user llm-gateway-equipo69
topic write smarthome/equipo69/llm/decision

# Digital Twin — full state subscriber + predictions
user digital-twin-equipo69
topic read smarthome/equipo69/#
topic write smarthome/equipo69/prediccion/temperatura
topic write smarthome/equipo69/prediccion/humedad
topic write smarthome/equipo69/prediccion/gas

# CoAP Bridge — per-sensor MQTT topics (publish-only, no subscribe)
user coap-bridge-equipo69
topic write smarthome/equipo69/sensores/#
