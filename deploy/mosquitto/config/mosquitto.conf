# Per-listener settings: each listener's security config is independent
per_listener_settings true

# TLS listener — servicios internos (backend Python, Node-RED)
listener 8883 0.0.0.0
cafile /mosquitto/certs/ca.crt
certfile /mosquitto/certs/server.crt
keyfile /mosquitto/certs/server.key
require_certificate false
use_identity_as_username false
password_file /mosquitto/config/passwd
acl_file /mosquitto/config/acl.conf
listener_allow_anonymous false

# Non-TLS listener — placas embebidas (MKR1000, ESP32-CAM)
# Autenticacion por user/password, sin cifrado de canal
listener 1884 0.0.0.0
password_file /mosquitto/config/passwd
acl_file /mosquitto/config/acl.conf
listener_allow_anonymous false

# Healthcheck listener — localhost only, anonymous allowed
listener 1883 127.0.0.1
listener_allow_anonymous true

# Global defaults
persistence true
persistence_location /mosquitto/data/
log_dest file /mosquitto/log/mosquitto.log
